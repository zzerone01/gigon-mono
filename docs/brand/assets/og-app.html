<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --royal: #103f96;
    --royal-dark: #0b2e6f;
    --amber: #f5a623;
    --ink: #0f1b2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .stage {
    width: 1200px; height: 630px;
    position: relative;
    font-family: "Inter", system-ui, sans-serif;
    color: #fff;
    background:
      radial-gradient(70% 110% at 18% 6%, #1b56c0 0%, rgba(27,86,192,0) 55%),
      radial-gradient(70% 110% at 84% 100%, #0a2a66 0%, rgba(10,42,102,0) 60%),
      linear-gradient(135deg, #123f95 0%, #0d3585 50%, #0b2e6f 100%);
    overflow: hidden;
  }

  /* faint map grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
    background-size: 84px 84px;
    mask-image: radial-gradient(130% 130% at 50% 45%, #000 45%, transparent 100%);
  }
  .road { position: absolute; opacity: 0.45; }
  .road.v1 { left: 170px;  top: -50px; height: 760px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(9deg); }
  .road.v2 { right: 200px; top: -60px; height: 780px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(-7deg); }

  .content {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding-bottom: 6px;
  }

  .lockup { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
  .tile {
    width: 62px; height: 62px; border-radius: 16px;
    background: #fff; display: grid; place-items: center;
    box-shadow: 0 10px 26px rgba(7,22,60,0.45);
  }
  .tile svg { width: 43px; height: 43px; }
  .word { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 43px; letter-spacing: -0.02em; line-height: 1; }
  .word .on { color: var(--amber); }

  h1 {
    font-family: "Poppins", sans-serif;
    font-weight: 800; font-size: 88px; line-height: 0.98;
    letter-spacing: -0.035em; margin-bottom: 22px;
  }
  h1 .on { color: var(--amber); }

  p.sub { font-size: 27px; line-height: 1.45; font-weight: 500; color: #cdddf7; max-width: 720px; margin-bottom: 30px; }
  p.sub b { color: #ffffff; font-weight: 700; }

  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 22px; border-radius: 999px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 21px; font-weight: 700; color: #ffffff;
    letter-spacing: 0.01em;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ee27a; box-shadow: 0 0 0 4px rgba(46,226,122,0.22); }

  /* decorative price pins, echoing the product map */
  .pin {
    position: absolute; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }
  .pin .tag {
    font-family: "Poppins", sans-serif; font-weight: 700; font-size: 21px;
    color: var(--ink);
    background: var(--amber);
    padding: 7px 15px; border-radius: 13px;
    box-shadow: 0 8px 20px rgba(7,22,60,0.4);
  }
  .pin .stem { width: 2.5px; height: 22px; background: rgba(255,255,255,0.55); }
  .pin .base { width: 11px; height: 11px; border-radius: 50%; background: var(--amber); border: 2.5px solid #fff; }

  .p1 { left: 92px;  top: 92px; }
  .p2 { right: 96px; top: 118px; }
  .p3 { left: 128px; bottom: 108px; }
  .p4 { right: 130px; bottom: 92px; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>
  <div class="road v1"></div>
  <div class="road v2"></div>

  <div class="pin p1"><span class="tag">₱300</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p2"><span class="tag">₱250</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p3"><span class="tag">₱180</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p4"><span class="tag">₱400</span><span class="stem"></span><span class="base"></span></div>

  <div class="content">
    <div class="lockup">
      <div class="tile">
        <svg viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#103f96" stroke-width="7" stroke-linecap="round" fill="none">
            <path d="M48 19.8 A21 21 0 1 1 18 19.8"/>
            <line x1="33" y1="33" x2="33" y2="12.6"/>
          </g>
        </svg>
      </div>
      <div class="word">Gig<span class="on">On</span></div>
    </div>

    <h1>Your gig is <span class="on">on.</span></h1>
    <p class="sub">Find and post <b>1–3 hour gigs</b> nearby —<br/>matched in minutes, confirmed by both sides.</p>

    <div class="pill"><span class="dot"></span> app.gigon.io</div>
  </div>
</div>
</body>
</html>
