<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* Google Play feature graphic — exactly 1024×500 */
  :root {
    --royal: #103f96;
    --amber: #f5a623;
    --ink: #0f1b2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  .stage {
    width: 1024px; height: 500px;
    position: relative;
    font-family: "Inter", system-ui, sans-serif;
    color: #fff;
    background:
      radial-gradient(70% 110% at 18% 6%, #1b56c0 0%, rgba(27,86,192,0) 55%),
      radial-gradient(70% 110% at 84% 100%, #0a2a66 0%, rgba(10,42,102,0) 60%),
      linear-gradient(135deg, #123f95 0%, #0d3585 50%, #0b2e6f 100%);
    overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
    background-size: 72px 72px;
    mask-image: radial-gradient(130% 130% at 50% 45%, #000 45%, transparent 100%);
  }
  .road { position: absolute; opacity: 0.45; }
  .road.v1 { left: 150px;  top: -40px; height: 620px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(9deg); }
  .road.v2 { right: 170px; top: -50px; height: 640px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(-7deg); }

  .content {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .lockup { display: flex; align-items: center; gap: 13px; margin-bottom: 22px; }
  .tile {
    width: 54px; height: 54px; border-radius: 14px;
    background: #fff; display: grid; place-items: center;
    box-shadow: 0 10px 26px rgba(7,22,60,0.45);
  }
  .tile svg { width: 37px; height: 37px; }
  .word { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 38px; letter-spacing: -0.02em; line-height: 1; }
  .word .on { color: var(--amber); }

  h1 {
    font-family: "Poppins", sans-serif;
    font-weight: 800; font-size: 62px; line-height: 0.98;
    letter-spacing: -0.035em; margin-bottom: 16px;
  }
  h1 .on { color: var(--amber); }
  p.sub { font-size: 22px; line-height: 1.4; font-weight: 500; color: #cdddf7; max-width: 640px; }
  p.sub b { color: #ffffff; font-weight: 700; }

  .pin { position: absolute; z-index: 2; display: flex; flex-direction: column; align-items: center; }
  .pin .tag {
    font-family: "Poppins", sans-serif; font-weight: 700; font-size: 19px;
    color: var(--ink); background: var(--amber);
    padding: 6px 13px; border-radius: 12px;
    box-shadow: 0 8px 20px rgba(7,22,60,0.4);
  }
  .pin .stem { width: 2.5px; height: 18px; background: rgba(255,255,255,0.55); }
  .pin .base { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); border: 2.5px solid #fff; }
  .p1 { left: 78px;  top: 64px; }
  .p2 { right: 84px; top: 84px; }
  .p3 { left: 108px; bottom: 76px; }
  .p4 { right: 112px; bottom: 62px; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>
  <div class="road v1"></div>
  <div class="road v2"></div>

  <div class="pin p1"><span class="tag">₱300</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p2"><span class="tag">₱250</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p3"><span class="tag">₱180</span><span class="stem"></span><span class="base"></span></div>
  <div class="pin p4"><span class="tag">₱400</span><span class="stem"></span><span class="base"></span></div>

  <div class="content">
    <div class="lockup">
      <div class="tile">
        <svg viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#103f96" stroke-width="7" stroke-linecap="round" fill="none">
            <path d="M48 19.8 A21 21 0 1 1 18 19.8"/>
            <line x1="33" y1="33" x2="33" y2="12.6"/>
          </g>
        </svg>
      </div>
      <div class="word">Gig<span class="on">On</span></div>
    </div>

    <h1>Your gig is <span class="on">on.</span></h1>
    <p class="sub">Find and post <b>1–3 hour gigs</b> nearby — matched in minutes,<br/>paid in cash, confirmed by both sides.</p>
  </div>
</div>
</body>
</html>
