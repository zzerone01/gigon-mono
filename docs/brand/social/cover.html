<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --royal: #103f96;
    --royal-dark: #0b2e6f;
    --amber: #f5a623;
    --ink: #0f1b2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1640px; height: 624px; overflow: hidden; }
  .stage {
    width: 1640px; height: 624px;
    position: relative;
    font-family: "Inter", system-ui, sans-serif;
    color: #fff;
    background:
      radial-gradient(70% 110% at 18% 6%, #1b56c0 0%, rgba(27,86,192,0) 55%),
      radial-gradient(70% 110% at 84% 100%, #0a2a66 0%, rgba(10,42,102,0) 60%),
      linear-gradient(135deg, #123f95 0%, #0d3585 50%, #0b2e6f 100%);
    overflow: hidden;
  }

  /* faint map grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
    background-size: 96px 96px;
    mask-image: radial-gradient(130% 130% at 50% 45%, #000 45%, transparent 100%);
  }
  /* dashed "road" lines, echoing the product map (kept to the edges) */
  .road { position: absolute; opacity: 0.45; }
  .road.v1 { left: 250px;  top: -50px; height: 760px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(9deg); }
  .road.v2 { right: 300px; top: -60px; height: 780px; border-left: 3px dashed rgba(255,255,255,0.26); transform: rotate(-7deg); }

  /* CENTERED content — lives inside Facebook's mobile-safe centre region */
  .content {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding-bottom: 8px;
  }

  .lockup { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
  .tile {
    width: 64px; height: 64px; border-radius: 17px;
    background: #fff; display: grid; place-items: center;
    box-shadow: 0 10px 26px rgba(7,22,60,0.45);
  }
  .tile svg { width: 44px; height: 44px; }
  .word { font-family: "Poppins", sans-serif; font-weight: 800; font-size: 44px; letter-spacing: -0.02em; line-height: 1; }
  .word .on { color: var(--amber); }

  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 9px 20px; border-radius: 999px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 19px; font-weight: 600; color: #dfe8fb;
    margin-bottom: 26px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ee27a; box-shadow: 0 0 0 4px rgba(46,226,122,0.22); }

  h1 {
    font-family: "Poppins", sans-serif;
    font-weight: 800; font-size: 100px; line-height: 0.98;
    letter-spacing: -0.035em; margin-bottom: 22px;
  }
  h1 .on { color: var(--amber); }

  p.sub { font-size: 29px; line-height: 1.4; font-weight: 500; color: #cdddf7; max-width: 760px; }
  p.sub b { color: #ffffff; font-weight: 700; }

  /* floating amber price pins — the GigOn map-marker motif, framing the sides
     (decorative; these sit outside the mobile-safe centre and may be cropped) */
  .pin {
    position: absolute; z-index: 2;
    display: inline-flex; flex-direction: column; align-items: center;
    filter: drop-shadow(0 12px 22px rgba(7,22,60,0.45));
  }
  .pin .chip {
    background: var(--amber); color: #1a1206;
    font-weight: 800; font-size: 24px; letter-spacing: -0.01em;
    padding: 9px 16px; border-radius: 13px; font-family: "Inter", sans-serif;
  }
  .pin .stem { width: 3px; height: 15px; background: var(--amber); opacity: 0.9; }
  .pin .marker { width: 16px; height: 16px; border-radius: 50%; background: var(--amber); border: 4px solid rgba(255,255,255,0.92); }

  .pin.p1 { top: 70px;  left: 110px; }
  .pin.p2 { top: 300px; left: 60px;  }
  .pin.p3 { top: 80px;  right: 130px;}
  .pin.p4 { top: 330px; right: 70px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="road v1"></div>
    <div class="road v2"></div>

    <!-- map-marker motif framing both sides -->
    <div class="pin p1"><div class="chip">₱300</div><div class="stem"></div><div class="marker"></div></div>
    <div class="pin p2"><div class="chip">₱180</div><div class="stem"></div><div class="marker"></div></div>
    <div class="pin p3"><div class="chip">₱250</div><div class="stem"></div><div class="marker"></div></div>
    <div class="pin p4"><div class="chip">₱400</div><div class="stem"></div><div class="marker"></div></div>

    <div class="content">
      <div class="lockup">
        <span class="tile">
          <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
            <g transform="translate(15 15)" stroke="#103f96" stroke-width="7.2" stroke-linecap="round" fill="none">
              <path d="M48 19.8 A21 21 0 1 1 18 19.8" />
              <line x1="33" y1="33" x2="33" y2="11.4" />
            </g>
          </svg>
        </span>
        <span class="word">Gig<span class="on">On</span></span>
      </div>

      <div class="pill"><span class="dot"></span>Now in private beta · Philippines</div>

      <h1>Your gig is <span class="on">on.</span></h1>
      <p class="sub">Short, local gigs matched with trusted people nearby — <b>post or pick up a 1–3 hour job</b> in minutes, not days.</p>
    </div>
  </div>
</body>
</html>
